name: release
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
      (inputs.confirm_publish && 'Release publish' || 'Release preview') ||
      'Release preview'
  }}
  - ${{ github.ref_name }}

on:
  push:
    branches:
      - master
      - beta
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Publishes a release to GitHub and npm.
        required: true
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release package
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      NPM_CONFIG_PROVENANCE: true
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Release preview
        if: github.event_name == 'push' || !inputs.confirm_publish
        run: pnpm exec semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: github.event_name == 'workflow_dispatch' && inputs.confirm_publish
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
